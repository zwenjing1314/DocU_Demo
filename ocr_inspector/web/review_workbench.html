<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Review Workbench</title>
  <style>
    :root {
      --bg: #f3eee6;
      --panel: #fffdf8;
      --ink: #29231d;
      --muted: #70675e;
      --line: #d8cbbb;
      --accent: #8f4a2f;
      --accent-soft: #f2dfd2;
      --danger: #b73f33;
      --ok: #2d6f4f;
    }
    * {
      box-sizing: border-box;
    }
    body {
      margin: 0;
      color: var(--ink);
      font-family: "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
      background: linear-gradient(180deg, #fbf7ef 0%, var(--bg) 100%);
    }
    header {
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: rgba(255, 253, 248, 0.9);
      position: sticky;
      top: 0;
      z-index: 2;
      backdrop-filter: blur(12px);
    }
    h1, h2, h3, p {
      margin: 0;
    }
    h1 {
      font-size: 24px;
    }
    h2 {
      font-size: 17px;
    }
    button {
      border: 0;
      border-radius: 999px;
      padding: 10px 14px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      cursor: pointer;
    }
    button.secondary {
      background: white;
      color: var(--accent);
      border: 1px solid var(--line);
    }
    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }
    input, textarea, select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 9px 10px;
      background: white;
      color: var(--ink);
      font: inherit;
    }
    textarea {
      resize: vertical;
      min-height: 72px;
    }
    img {
      width: 100%;
      display: block;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: white;
    }
    .muted {
      color: var(--muted);
    }
    .shell {
      width: min(1480px, calc(100vw - 28px));
      margin: 0 auto;
      padding: 18px 0 36px;
    }
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .meta {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 10px;
    }
    .tag {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      background: var(--accent-soft);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(320px, 1.05fr) minmax(360px, 0.9fr) minmax(300px, 0.75fr);
      gap: 14px;
      align-items: start;
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px;
    }
    .panel-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      margin-bottom: 12px;
    }
    .image-stack {
      display: grid;
      gap: 12px;
    }
    .field-list,
    .queue-list {
      display: grid;
      gap: 10px;
      max-height: calc(100vh - 245px);
      overflow: auto;
      padding-right: 2px;
    }
    .field-row,
    .queue-row {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 10px;
      background: white;
    }
    .field-row.changed {
      border-color: var(--ok);
      background: #f0faf4;
    }
    .field-label,
    .queue-title {
      display: flex;
      justify-content: space-between;
      gap: 8px;
      margin-bottom: 7px;
      font-size: 13px;
      font-weight: 700;
    }
    .field-path {
      font-size: 12px;
      color: var(--muted);
      overflow-wrap: anywhere;
    }
    .queue-row {
      cursor: pointer;
    }
    .queue-row:hover {
      border-color: var(--accent);
    }
    .queue-row.low {
      border-color: #e6b3ad;
    }
    .queue-text {
      font-size: 13px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .save-panel {
      margin-top: 14px;
      display: grid;
      gap: 10px;
    }
    .status {
      min-height: 22px;
      margin-top: 10px;
      font-weight: 700;
    }
    .status.error {
      color: var(--danger);
    }
    .status.ok {
      color: var(--ok);
    }
    .empty {
      padding: 14px;
      border: 1px dashed var(--line);
      border-radius: 10px;
      background: white;
      color: var(--muted);
    }
    @media (max-width: 1080px) {
      .layout {
        grid-template-columns: 1fr;
      }
      .field-list,
      .queue-list {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="topbar">
      <div>
        <h1>Review Workbench</h1>
        <p id="subtitle" class="muted">加载复核任务中…</p>
      </div>
      <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <button id="reloadButton" class="secondary" type="button">刷新</button>
        <button id="saveButton" type="button">保存修订</button>
      </div>
    </div>
    <div id="meta" class="meta"></div>
    <div id="status" class="status"></div>
  </header>

  <main class="shell">
    <section class="layout">
      <aside class="panel">
        <div class="panel-head">
          <h2>页面</h2>
          <select id="pageSelect"></select>
        </div>
        <div id="pageImages" class="image-stack"></div>
      </aside>

      <section class="panel">
        <div class="panel-head">
          <h2>预测字段</h2>
          <span id="changedCount" class="tag">0 changed</span>
        </div>
        <div id="fieldList" class="field-list"></div>
        <div class="save-panel">
          <label for="reviewerInput">Reviewer</label>
          <input id="reviewerInput" type="text" value="manual_reviewer" />
          <label for="noteInput">本次修订备注</label>
          <textarea id="noteInput" placeholder="例如：复核总金额和合同日期"></textarea>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-head">
          <h2>低置信度队列</h2>
          <span id="queueCount" class="tag">0 items</span>
        </div>
        <div id="queueList" class="queue-list"></div>
      </aside>
    </section>
  </main>

  <script>
    const jobId = decodeURIComponent(location.pathname.split('/').filter(Boolean).pop() || '');
    const subtitleEl = document.getElementById('subtitle');
    const metaEl = document.getElementById('meta');
    const statusEl = document.getElementById('status');
    const pageSelect = document.getElementById('pageSelect');
    const pageImages = document.getElementById('pageImages');
    const fieldList = document.getElementById('fieldList');
    const queueList = document.getElementById('queueList');
    const queueCount = document.getElementById('queueCount');
    const changedCount = document.getElementById('changedCount');
    const saveButton = document.getElementById('saveButton');
    const reloadButton = document.getElementById('reloadButton');
    const reviewerInput = document.getElementById('reviewerInput');
    const noteInput = document.getElementById('noteInput');

    const state = {
      payload: null,
      activePage: 1
    };

    const escapeHtml = (value = '') => String(value).replace(/[&<>"']/g, (match) => ({
      '&': '&amp;',
      '<': '&lt;',
      '>': '&gt;',
      '"': '&quot;',
      "'": '&#39;'
    }[match]));

    const setStatus = (message, kind = '') => {
      statusEl.textContent = message;
      statusEl.className = `status ${kind}`.trim();
    };

    const formatConfidence = (value) => Number.isFinite(value) ? `${value.toFixed(1)}%` : 'N/A';

    const getChangedRows = () => Array.from(fieldList.querySelectorAll('[data-field-id]')).filter((row) => {
      const input = row.querySelector('input');
      return input && input.value !== input.dataset.original;
    });

    const refreshChangedCount = () => {
      const changedRows = getChangedRows();
      changedCount.textContent = `${changedRows.length} changed`;
      saveButton.disabled = changedRows.length === 0;
      Array.from(fieldList.querySelectorAll('[data-field-id]')).forEach((row) => {
        const input = row.querySelector('input');
        row.classList.toggle('changed', input && input.value !== input.dataset.original);
      });
    };

    const renderPage = () => {
      const page = (state.payload?.pages || []).find((item) => item.page_num === state.activePage);
      if (!page) {
        pageImages.innerHTML = '<div class="empty">暂无页面图像。</div>';
        return;
      }

      const reviewImage = page.review_overlay_url || page.overlay_url;
      pageImages.innerHTML = `
        <div>
          <div class="field-label"><span>原图 Page ${page.page_num}</span><span>${page.image_width || '-'} x ${page.image_height || '-'}</span></div>
          <img src="${page.image_url}" alt="page ${page.page_num}" />
        </div>
        <div>
          <div class="field-label"><span>复核叠框</span><span>${page.review_counts.suspicious_field_count || 0} suspicious</span></div>
          ${reviewImage ? `<img src="${reviewImage}" alt="review overlay ${page.page_num}" />` : '<div class="empty">暂无复核叠框。</div>'}
        </div>
      `;
    };

    const renderFields = () => {
      const fields = state.payload?.predicted_fields || [];
      if (!fields.length) {
        fieldList.innerHTML = '<div class="empty">暂无可编辑预测字段。</div>';
        refreshChangedCount();
        return;
      }

      fieldList.innerHTML = fields.map((field) => `
        <article class="field-row" data-field-id="${escapeHtml(field.field_id)}">
          <div class="field-label">
            <span>${escapeHtml(field.label)}</span>
            <span>${escapeHtml(field.source)} · p${field.page_num || '-'}</span>
          </div>
          <input
            data-original="${escapeHtml(field.value || '')}"
            data-field-path="${escapeHtml(field.field_path || '')}"
            data-source="${escapeHtml(field.source || '')}"
            data-page-num="${escapeHtml(field.page_num || '')}"
            value="${escapeHtml(field.value || '')}"
          />
          <div class="field-path">${escapeHtml(field.field_path || '')}</div>
          <div class="muted" style="font-size: 12px;">${escapeHtml(field.review_reason || '')} · confidence ${formatConfidence(field.confidence)}</div>
        </article>
      `).join('');

      fieldList.querySelectorAll('input').forEach((input) => {
        input.addEventListener('input', refreshChangedCount);
      });
      refreshChangedCount();
    };

    const renderQueue = () => {
      const queue = state.payload?.review_queue || [];
      queueCount.textContent = `${queue.length} items`;
      if (!queue.length) {
        queueList.innerHTML = '<div class="empty">暂无低置信度或可疑项。</div>';
        return;
      }

      queueList.innerHTML = queue.map((item) => `
        <article class="queue-row ${item.confidence !== null && item.confidence < 70 ? 'low' : ''}" data-page-num="${escapeHtml(item.page_num || '')}">
          <div class="queue-title">
            <span>${escapeHtml(item.type)}</span>
            <span>p${item.page_num || '-'} · ${formatConfidence(item.confidence)}</span>
          </div>
          <div class="queue-text">${escapeHtml(item.text || '(empty)')}</div>
          <div class="muted" style="font-size: 12px; margin-top: 6px;">${escapeHtml(item.review_reason || '')}</div>
        </article>
      `).join('');

      queueList.querySelectorAll('[data-page-num]').forEach((row) => {
        row.addEventListener('click', () => {
          const pageNum = Number(row.dataset.pageNum);
          if (!Number.isFinite(pageNum)) {
            return;
          }
          state.activePage = pageNum;
          pageSelect.value = String(pageNum);
          renderPage();
        });
      });
    };

    const render = () => {
      const data = state.payload;
      subtitleEl.textContent = `${data.source_file || ''} · job ${data.job_id}`;
      metaEl.innerHTML = `
        <span class="tag">${data.page_count || 0} pages</span>
        <span class="tag">${data.analysis.predicted_field_count || 0} fields</span>
        <span class="tag">${data.analysis.review_queue_count || 0} queue</span>
        <span class="tag">${data.analysis.revision_count || 0} revisions</span>
      `;
      pageSelect.innerHTML = (data.pages || []).map((page) =>
        `<option value="${page.page_num}">Page ${page.page_num}</option>`
      ).join('');
      state.activePage = data.pages?.[0]?.page_num || 1;
      pageSelect.value = String(state.activePage);
      renderPage();
      renderFields();
      renderQueue();
    };

    const loadState = async () => {
      setStatus('加载复核状态中…');
      const response = await fetch(`/api/review/${encodeURIComponent(jobId)}/state`);
      if (!response.ok) {
        throw new Error(await response.text());
      }
      state.payload = await response.json();
      render();
      setStatus('复核状态已加载。', 'ok');
    };

    const saveRevisions = async () => {
      const changedRows = getChangedRows();
      if (!changedRows.length) {
        setStatus('没有需要保存的改动。', 'error');
        return;
      }

      const revisions = changedRows.map((row) => {
        const input = row.querySelector('input');
        return {
          field_id: row.dataset.fieldId,
          field_path: input.dataset.fieldPath,
          source: input.dataset.source,
          page_num: input.dataset.pageNum ? Number(input.dataset.pageNum) : null,
          old_value: input.dataset.original,
          new_value: input.value,
          review_status: 'corrected'
        };
      });

      saveButton.disabled = true;
      setStatus('保存人工修订中…');
      const response = await fetch(`/api/review/${encodeURIComponent(jobId)}/save`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          reviewer: reviewerInput.value,
          note: noteInput.value,
          revisions
        })
      });

      if (!response.ok) {
        saveButton.disabled = false;
        throw new Error(await response.text());
      }

      const result = await response.json();
      setStatus(`已保存 ${result.revision_count} 条累计修订。`, 'ok');
      await loadState();
    };

    pageSelect.addEventListener('change', () => {
      state.activePage = Number(pageSelect.value);
      renderPage();
    });
    reloadButton.addEventListener('click', () => loadState().catch((error) => setStatus(error.message, 'error')));
    saveButton.addEventListener('click', () => saveRevisions().catch((error) => setStatus(error.message, 'error')));

    loadState().catch((error) => setStatus(error.message, 'error'));
  </script>
</body>
</html>
